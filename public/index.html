<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Promos activas</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --ink: #202124;
      --muted: #667085;
      --line: #d8dee4;
      --panel: #ffffff;
      --soft: #f6f8fa;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --blue: #1d4ed8;
      --amber: #b45309;
      --green: #047857;
      --danger: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--soft);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      line-height: 1.45;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      padding: 16px 24px;
    }

    .header-inner {
      max-width: 1240px;
      margin: 0 auto;
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    main {
      width: min(1240px, calc(100% - 32px));
      margin: 18px auto;
      display: grid;
      gap: 14px;
    }

    .toolbar,
    .summary,
    .filters,
    .empty-state,
    .table-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      gap: 14px;
      align-items: end;
      padding: 16px;
    }

    .file-box {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    input {
      min-height: 42px;
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(126px, 1fr));
      gap: 8px;
    }

    button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: var(--brand);
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      padding: 0 14px;
      white-space: nowrap;
    }

    button:hover {
      background: var(--brand-dark);
    }

    button.secondary {
      background: #ffffff;
      color: var(--brand-dark);
      border-color: var(--brand);
    }

    button.secondary:hover {
      background: #eef7f6;
    }

    button.ghost {
      background: #ffffff;
      color: var(--ink);
      border-color: var(--line);
    }

    button.ghost:hover {
      background: #f3f4f6;
    }

    button.active {
      background: var(--blue);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .summary {
      display: block;
      padding: 0 2px;
      color: var(--muted);
      background: transparent;
      border: 0;
      border-radius: 0;
    }

    .summary strong {
      color: var(--ink);
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(260px, 1.2fr) minmax(220px, 0.9fr) auto;
      gap: 12px;
      align-items: start;
      padding: 14px 16px;
    }

    .filter-field {
      display: grid;
      gap: 6px;
    }

    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      min-height: 34px;
      border-color: var(--line);
      background: #ffffff;
      color: var(--ink);
      font-size: 13px;
      padding: 0 11px;
    }

    .chip:hover {
      background: #f3f4f6;
    }

    .chip.active {
      border-color: var(--blue);
      background: var(--blue);
      color: #ffffff;
    }

    .promo-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 14px;
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-title {
      font-weight: 700;
      font-size: 17px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      background: #eef2ff;
      color: #3730a3;
    }

    .pill.ok {
      background: #ecfdf3;
      color: var(--green);
    }

    .pill.warn {
      background: #fff7ed;
      color: var(--amber);
    }

    .pill.bad {
      background: #fef3f2;
      color: var(--danger);
    }

    .card-main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .card-field {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .card-field.full {
      grid-column: 1 / -1;
    }

    .card-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .card-value {
      overflow-wrap: anywhere;
    }

    details {
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    summary {
      cursor: pointer;
      color: var(--brand-dark);
      font-weight: 700;
    }

    .detail-grid {
      display: grid;
      gap: 7px;
      margin-top: 8px;
    }

    .empty-state {
      padding: 42px 18px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state strong {
      display: block;
      color: var(--ink);
      font-size: 18px;
      margin-bottom: 6px;
    }

    .table-shell {
      overflow: auto;
      max-height: calc(100vh - 250px);
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      background: #ffffff;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      max-width: 340px;
      overflow-wrap: anywhere;
    }

    th.description-cell,
    td.description-cell {
      min-width: 560px;
      max-width: 780px;
      line-height: 1.45;
      white-space: normal;
    }

    .promo-description {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .promo-check-line {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 6px;
      align-items: start;
    }

    .promo-check {
      color: var(--green);
      font-weight: 700;
      line-height: 1.45;
    }

    .promo-text {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #ecfdf5;
      color: #064e3b;
      font-size: 13px;
      text-transform: uppercase;
    }

    tr:nth-child(even) td {
      background: #fafafa;
    }

    .error {
      color: var(--danger);
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .toolbar,
      .filters {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      header {
        padding: 16px;
      }

      h1 {
        font-size: 21px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .card-main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-inner">
        <h1>Promos activas</h1>
        <div class="status">
          <div id="fileStatus">Sin planilla cargada</div>
          <div id="serverStatus">Revisando servidor...</div>
        </div>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="Controles">
        <div class="file-box">
          <label for="excelFile">Subir planilla Excel</label>
          <input id="excelFile" type="file" accept=".xlsx,.xls,.xlsm,.csv">
        </div>

        <div class="actions">
          <button id="btnSuipacha" type="button" disabled>Suipacha</button>
          <button id="btnBariloche" type="button" disabled>Bariloche</button>
          <button id="downloadBtn" class="secondary" type="button" disabled>Descargar resultado</button>
          <button id="btnDatos" class="secondary" type="button" disabled>Datos útiles</button>
        </div>
      </section>

      <section class="summary" aria-live="polite">
        <span id="resultTitle"><strong>Resultado:</strong> cargá una planilla y elegí una opción.</span>
        <span id="resultMeta"></span>
      </section>

      <section id="filters" class="filters hidden" aria-label="Filtros">
        <div class="filter-field">
          <label for="searchInput">Buscar en resultados</label>
          <input id="searchInput" type="search" placeholder="Producto, banco, promo, fecha...">
        </div>

        <div id="operatorFilterBox" class="filter-field hidden">
          <label>Operadora de tarjeta</label>
          <div id="operatorButtons" class="chip-group"></div>
        </div>

        <div id="statusFilterBox" class="filter-field hidden">
          <label>Estado de vigencia</label>
          <div id="statusButtons" class="chip-group"></div>
        </div>

      </section>

      <section id="emptyState" class="empty-state">
        <strong>No hay datos para mostrar</strong>
        La tabla aparecerá acá cuando cargues el archivo y presiones un botón.
      </section>

      <section id="tableShell" class="table-shell hidden" aria-label="Datos encontrados">
        <table id="resultTable"></table>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "promos-activas-ultima-opcion";
    const DATE_WORDS = ["fecha", "vigencia", "hasta", "vto", "vencimiento", "fin"];
    const PRIORITY_WORDS = ["descripcion de promo", "descripcion promo", "promo", "promocion", "beneficio", "producto", "descripcion", "detalle", "banco", "tarjeta", "descuento", "vigencia", "hasta", "medio", "rubro", "sucursal"];

    const state = {
      workbook: null,
      fileName: "",
      savedAt: "",
      sheetCount: 0,
      activeData: null,
      usefulData: null,
      currentTitle: "",
      currentSource: "",
      currentHeaders: [],
      baseRecords: [],
      visibleRecords: [],
      operatorHeader: "",
      statusHeader: "",
      selectedOperator: "",
      selectedStatus: ""
    };

    const fileInput = document.getElementById("excelFile");
    const fileStatus = document.getElementById("fileStatus");
    const serverStatus = document.getElementById("serverStatus");
    const resultTitle = document.getElementById("resultTitle");
    const resultMeta = document.getElementById("resultMeta");
    const emptyState = document.getElementById("emptyState");
    const filters = document.getElementById("filters");
    const searchInput = document.getElementById("searchInput");
    const operatorFilterBox = document.getElementById("operatorFilterBox");
    const statusFilterBox = document.getElementById("statusFilterBox");
    const operatorButtons = document.getElementById("operatorButtons");
    const statusButtons = document.getElementById("statusButtons");
    const downloadBtn = document.getElementById("downloadBtn");
    const tableShell = document.getElementById("tableShell");
    const resultTable = document.getElementById("resultTable");
    const buttons = {
      suipacha: document.getElementById("btnSuipacha"),
      bariloche: document.getElementById("btnBariloche"),
      datos: document.getElementById("btnDatos")
    };

    fileInput.addEventListener("change", handleFile);
    buttons.suipacha.addEventListener("click", () => showBranch("Suipacha"));
    buttons.bariloche.addEventListener("click", () => showBranch("Bariloche"));
    buttons.datos.addEventListener("click", showUsefulData);
    searchInput.addEventListener("input", applyFilters);
    operatorButtons.addEventListener("click", handleOperatorClick);
    statusButtons.addEventListener("click", handleStatusClick);
    downloadBtn.addEventListener("click", downloadResults);
    loadSavedData();

    function normalizeText(value) {
      return String(value ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim()
        .toLowerCase();
    }

    function cleanCell(value) {
      if (value instanceof Date) {
        return value.toLocaleDateString("es-AR");
      }

      return value == null ? "" : String(value).trim();
    }

    function setButtonsEnabled(enabled) {
      Object.values(buttons).forEach((button) => {
        button.disabled = !enabled;
      });
    }

    async function handleFile(event) {
      const file = event.target.files[0];
      resetView();

      if (!file) {
        fileStatus.textContent = "Sin planilla cargada";
        setButtonsEnabled(false);
        return;
      }

      if (!window.XLSX) {
        showError("No se pudo cargar el lector de Excel. Revisá la conexión a internet y volvé a abrir el archivo.");
        return;
      }

      try {
        const data = await file.arrayBuffer();
        state.workbook = XLSX.read(data, {
          type: "array",
          cellDates: true
        });
        state.fileName = file.name;
        state.savedAt = new Date().toISOString();
        state.sheetCount = state.workbook.SheetNames.length;
        state.activeData = readMainSheet(state.workbook);
        state.usefulData = readUsefulSheet(state.workbook);
        await saveServerData();
        fileStatus.textContent = `Planilla guardada: ${file.name}`;
        serverStatus.textContent = "Servidor conectado - datos disponibles para otros equipos";
        setButtonsEnabled(true);
        resultTitle.innerHTML = "<strong>Resultado:</strong> elegí Suipacha, Bariloche o Datos útiles.";
        resultMeta.textContent = ` ${state.sheetCount} pestaña(s) detectada(s) - disponible para otros equipos`;
        openLastSelectionOrDefault();
      } catch (error) {
        console.error(error);
        showError(readableError(error));
        setButtonsEnabled(false);
      }
    }

    async function loadSavedData() {
      try {
        const response = await fetch("/api/data");

        if (!response.ok) {
          throw new Error("No se pudo consultar la planilla guardada.");
        }

        const payload = await response.json();

        if (!payload.exists) {
          serverStatus.textContent = "Servidor conectado - sin planilla guardada";
          resultTitle.innerHTML = "<strong>Resultado:</strong> todavía no hay una planilla guardada en el servidor.";
          return;
        }

        const data = payload.data;
        state.fileName = data.fileName || "planilla guardada";
        state.savedAt = data.savedAt || "";
        state.sheetCount = Number(data.sheetCount || 0);
        state.activeData = data.activeData;
        state.usefulData = data.usefulData;
        fileStatus.textContent = `Planilla guardada: ${state.fileName}`;
        serverStatus.textContent = "Servidor conectado - datos cargados";
        setButtonsEnabled(true);
        resultTitle.innerHTML = "<strong>Resultado:</strong> datos cargados desde el servidor.";
        resultMeta.textContent = state.savedAt ? ` Ultima actualización: ${formatDateTime(state.savedAt)}` : "";
        openLastSelectionOrDefault();
      } catch (error) {
        console.error(error);
        serverStatus.textContent = "No conectado al servidor de datos";
        resultMeta.textContent = " No se pudo revisar si hay una planilla guardada.";
      }
    }

    async function saveServerData() {
      const payload = {
        fileName: state.fileName,
        savedAt: state.savedAt,
        sheetCount: state.sheetCount,
        activeData: state.activeData,
        usefulData: state.usefulData
      };
      const response = await fetch("/api/data", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.error || "La planilla se leyó, pero no se pudo guardar en el servidor.");
      }
    }

    function readMainSheet(workbook) {
      const usefulName = findSheetName(workbook, "DATOS UTILES");
      const mainName = workbook.SheetNames.find((name) => name !== usefulName);

      if (!mainName) {
        throw new Error("No se encontró una pestaña principal para las promociones.");
      }

      const data = sheetToRecords(workbook.Sheets[mainName]);
      if (!data.headers.length || !data.records.length) {
        throw new Error(`La pestaña ${mainName} no tiene datos para mostrar.`);
      }

      return data;
    }

    function readUsefulSheet(workbook) {
      const usefulName = findSheetName(workbook, "DATOS UTILES");

      if (!usefulName) {
        return { headers: [], records: [], missing: true };
      }

      return sheetToRecords(workbook.Sheets[usefulName]);
    }

    function findSheetName(workbook, targetName) {
      const target = normalizeText(targetName);
      return workbook.SheetNames.find((name) => normalizeText(name) === target);
    }

    function sheetToRecords(sheet) {
      const rows = XLSX.utils.sheet_to_json(sheet, {
        header: 1,
        defval: "",
        blankrows: false,
        raw: false
      });

      if (!rows.length) {
        return { headers: [], records: [] };
      }

      const headerRowIndex = findHeaderRowIndex(rows);
      const rawHeaders = rows[headerRowIndex] || [];
      const width = getUsefulWidth(rows, headerRowIndex);
      const headers = makeHeaders(rawHeaders, width);
      const records = rows.slice(headerRowIndex + 1)
        .map((row) => headers.reduce((record, header, index) => {
          record[header] = cleanCell(row[index]);
          return record;
        }, {}))
        .filter((record) => Object.values(record).some((value) => value !== ""));

      return { headers, records };
    }

    function findHeaderRowIndex(rows) {
      const sucursalIndex = rows.findIndex((row) =>
        row.some((cell) => normalizeText(cell) === "sucursal")
      );

      if (sucursalIndex >= 0) {
        return sucursalIndex;
      }

      return rows.findIndex((row) => row.some((cell) => cleanCell(cell) !== "")) || 0;
    }

    function getUsefulWidth(rows, headerRowIndex) {
      let width = 0;
      rows.slice(headerRowIndex).forEach((row) => {
        row.forEach((cell, index) => {
          if (cleanCell(cell) !== "") {
            width = Math.max(width, index + 1);
          }
        });
      });
      return width;
    }

    function makeHeaders(rawHeaders, width) {
      const seen = new Map();

      return Array.from({ length: width }, (_, index) => {
        const original = cleanCell(rawHeaders[index]);
        const base = original || `Dato ${index + 1}`;
        const key = normalizeText(base);
        const count = seen.get(key) || 0;
        seen.set(key, count + 1);
        return count ? `${base} ${count + 1}` : base;
      });
    }

    function openLastSelectionOrDefault() {
      const last = localStorage.getItem(STORAGE_KEY);
      if (last === "suipacha") {
        showBranch("Suipacha");
      } else if (last === "bariloche") {
        showBranch("Bariloche");
      } else if (last === "datos") {
        showUsefulData();
      } else {
        showBranch("Suipacha");
      }
    }

    function showBranch(branchName) {
      if (!state.activeData) {
        showError("Primero cargá una planilla.");
        return;
      }

      const sucursalHeader = state.activeData.headers.find((header) =>
        normalizeText(header) === "sucursal"
      );

      if (!sucursalHeader) {
        showError("No se encontró la columna Sucursal en la pestaña principal. Revisá que el encabezado se llame exactamente Sucursal.");
        return;
      }

      const needle = normalizeText(branchName);
      const records = state.activeData.records.filter((record) =>
        normalizeText(record[sucursalHeader]).includes(needle)
      );

      localStorage.setItem(STORAGE_KEY, normalizeText(branchName));
      setActiveButton(normalizeText(branchName));
      renderResults(state.activeData.headers, records, branchName, "Sucursal");
    }

    function showUsefulData() {
      if (!state.usefulData || state.usefulData.missing) {
        showError("No se encontró la pestaña DATOS UTILES en la planilla. Revisá que exista con ese nombre.");
        return;
      }

      if (!state.usefulData.records.length) {
        showError("La pestaña DATOS UTILES está vacía.");
        return;
      }

      localStorage.setItem(STORAGE_KEY, "datos");
      setActiveButton("datos");
      renderResults(state.usefulData.headers, state.usefulData.records, "Datos útiles", "Pestaña DATOS UTILES");
    }

    function renderResults(headers, records, title, source) {
      state.currentTitle = title;
      state.currentSource = source;
      state.currentHeaders = headers;
      state.baseRecords = records;
      searchInput.value = "";
      setupQuickFilters(headers, records);
      filters.classList.toggle("hidden", records.length === 0);
      downloadBtn.disabled = records.length === 0;
      applyFilters();
    }

    function setupQuickFilters(headers, records) {
      state.operatorHeader = findHeader(headers, ["operadora de tarjeta", "operadora tarjeta", "operador de tarjeta", "tarjeta operadora"]);
      state.statusHeader = findHeader(headers, ["estado de vigencia", "estado vigencia", "vigencia estado"]);
      state.selectedOperator = "";
      state.selectedStatus = "";

      setupButtonFilter(operatorFilterBox, operatorButtons, state.operatorHeader ? uniqueValues(records, state.operatorHeader) : [], "operator");
      setupButtonFilter(statusFilterBox, statusButtons, state.statusHeader ? sortStatusValues(uniqueValues(records, state.statusHeader)) : [], "status");
    }

    function findHeader(headers, aliases) {
      return headers.find((header) => {
        const normalized = normalizeText(header);
        return aliases.some((alias) => normalized === normalizeText(alias) || normalized.includes(normalizeText(alias)));
      }) || "";
    }

    function setupButtonFilter(box, container, values, type) {
      if (!values.length) {
        box.classList.add("hidden");
        container.innerHTML = "";
        return;
      }

      box.classList.remove("hidden");
      container.innerHTML = [
        buttonFilterHtml("Todos", "", type, true),
        ...values.map((value) => buttonFilterHtml(value, value, type, false))
      ].join("");
    }

    function buttonFilterHtml(label, value, type, active) {
      return `<button class="chip ${active ? "active" : ""}" type="button" data-filter-type="${escapeHtml(type)}" data-filter-value="${escapeHtml(value)}">${escapeHtml(label)}</button>`;
    }

    function sortStatusValues(values) {
      const order = ["activada", "activa", "desactivada", "desactiva"];
      return values.sort((a, b) => {
        const aIndex = order.indexOf(normalizeText(a));
        const bIndex = order.indexOf(normalizeText(b));

        if (aIndex >= 0 || bIndex >= 0) {
          return (aIndex < 0 ? 99 : aIndex) - (bIndex < 0 ? 99 : bIndex);
        }

        return a.localeCompare(b, "es");
      });
    }

    function uniqueValues(records, header) {
      return Array.from(new Set(records.map((record) => cleanCell(record[header])).filter(Boolean)))
        .sort((a, b) => a.localeCompare(b, "es"));
    }

    function applyFilters() {
      const query = normalizeText(searchInput.value);

      state.visibleRecords = state.baseRecords.filter((record) => {
        const matchesSearch = !query || Object.values(record).some((value) => normalizeText(value).includes(query));
        const matchesOperator = !state.selectedOperator || cleanCell(record[state.operatorHeader]) === state.selectedOperator;
        const matchesStatus = !state.selectedStatus || cleanCell(record[state.statusHeader]) === state.selectedStatus;
        return matchesSearch && matchesOperator && matchesStatus;
      });

      renderVisibleResults();
    }

    function handleOperatorClick(event) {
      const button = event.target.closest("button[data-filter-type='operator']");
      if (!button) {
        return;
      }

      state.selectedOperator = button.dataset.filterValue || "";
      setChipActive(operatorButtons, state.selectedOperator);
      applyFilters();
    }

    function handleStatusClick(event) {
      const button = event.target.closest("button[data-filter-type='status']");
      if (!button) {
        return;
      }

      state.selectedStatus = button.dataset.filterValue || "";
      setChipActive(statusButtons, state.selectedStatus);
      applyFilters();
    }

    function setChipActive(container, value) {
      Array.from(container.querySelectorAll(".chip")).forEach((button) => {
        button.classList.toggle("active", (button.dataset.filterValue || "") === value);
      });
    }

    function renderVisibleResults() {
      resultTitle.innerHTML = `<strong>Resultado:</strong> ${escapeHtml(state.currentTitle || "Sin selección")}`;
      resultMeta.textContent = state.baseRecords.length
        ? ` ${state.visibleRecords.length} de ${state.baseRecords.length} fila(s) - ${state.currentSource}`
        : "";

      if (!state.baseRecords.length) {
        showEmpty(`No hay datos para ${state.currentTitle} en la planilla cargada.`);
        return;
      }

      if (!state.visibleRecords.length) {
        tableShell.classList.add("hidden");
        emptyState.classList.remove("hidden");
        emptyState.innerHTML = "<strong>No se encontraron coincidencias</strong>Probá limpiar el buscador o los filtros.";
        downloadBtn.disabled = true;
        return;
      }

      downloadBtn.disabled = false;
      emptyState.classList.add("hidden");
      renderTable();
      tableShell.classList.remove("hidden");
    }

    function pickPrimaryHeaders(headers) {
      const picked = [];
      PRIORITY_WORDS.forEach((word) => {
        const found = headers.find((header) => normalizeText(header).includes(word) && !picked.includes(header));
        if (found) {
          picked.push(found);
        }
      });

      headers.forEach((header) => {
        if (picked.length < 6 && !picked.includes(header)) {
          picked.push(header);
        }
      });

      return picked;
    }

    function fieldHtml(header, value, full = false) {
      return `
        <div class="card-field ${full ? "full" : ""}">
          <div class="card-label">${escapeHtml(header)}</div>
          <div class="card-value">${escapeHtml(value || "-")}</div>
        </div>
      `;
    }

    function findDateHeader(headers) {
      return headers.find((header) => DATE_WORDS.some((word) => normalizeText(header).includes(word)));
    }

    function getValidityStatus(record, dateHeader) {
      if (!dateHeader) {
        return null;
      }

      const date = parseSpanishDate(record[dateHeader]);
      if (!date) {
        return null;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      date.setHours(0, 0, 0, 0);
      const diffDays = Math.round((date - today) / 86400000);

      if (diffDays < 0) {
        return { label: "Vencida", kind: "bad" };
      }

      if (diffDays <= 7) {
        return { label: "Por vencer", kind: "warn" };
      }

      return { label: "Vigente", kind: "ok" };
    }

    function parseSpanishDate(value) {
      const text = cleanCell(value);
      const match = text.match(/(\d{1,2})[\/.-](\d{1,2})[\/.-](\d{2,4})/);
      if (!match) {
        return null;
      }

      const day = Number(match[1]);
      const month = Number(match[2]) - 1;
      const rawYear = Number(match[3]);
      const year = rawYear < 100 ? 2000 + rawYear : rawYear;
      const date = new Date(year, month, day);

      return Number.isNaN(date.getTime()) ? null : date;
    }

    function renderTable() {
      const headers = state.currentHeaders;
      const thead = `<thead><tr>${headers.map((header) => `<th class="${columnClass(header)}">${escapeHtml(header)}</th>`).join("")}</tr></thead>`;
      const tbody = `<tbody>${state.visibleRecords.map((record) => (
        `<tr>${headers.map((header) => `<td class="${columnClass(header)}">${cellHtml(header, record[header])}</td>`).join("")}</tr>`
      )).join("")}</tbody>`;

      resultTable.innerHTML = thead + tbody;
    }

    function cellHtml(header, value) {
      if (columnClass(header) === "description-cell") {
        return descriptionHtml(value);
      }

      return escapeHtml(value);
    }

    function descriptionHtml(value) {
      const text = cleanCell(value);

      if (!text) {
        return "";
      }

      const normalized = text
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .replace(/\s*(✔️|✔|✅)\s*/g, "\n$1 ");
      const lines = normalized
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean);

      if (!lines.length) {
        return escapeHtml(text);
      }

      return `<div class="promo-description">${lines.map((line) => {
        const match = line.match(/^(✔️|✔|✅)\s*(.*)$/);

        if (!match) {
          return `<div class="promo-text">${escapeHtml(line)}</div>`;
        }

        return `<div class="promo-check-line"><span class="promo-check">${escapeHtml(match[1])}</span><span class="promo-text">${escapeHtml(match[2])}</span></div>`;
      }).join("")}</div>`;
    }

    function columnClass(header) {
      const normalized = normalizeText(header);
      return normalized.includes("descripcion") && normalized.includes("promo") ? "description-cell" : "";
    }

    function setActiveButton(activeKey) {
      Object.entries(buttons).forEach(([key, button]) => {
        button.classList.toggle("active", key === activeKey);
      });
    }

    function downloadResults() {
      if (!state.visibleRecords.length || !window.XLSX) {
        return;
      }

      const worksheet = XLSX.utils.json_to_sheet(state.visibleRecords, {
        header: state.currentHeaders
      });
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Resultado");
      const safeTitle = normalizeText(state.currentTitle).replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "resultado";
      XLSX.writeFile(workbook, `promos-${safeTitle}.xlsx`);
    }

    function resetView() {
      state.workbook = null;
      state.fileName = "";
      state.savedAt = "";
      state.sheetCount = 0;
      state.activeData = null;
      state.usefulData = null;
      state.currentTitle = "";
      state.currentSource = "";
      state.currentHeaders = [];
      state.baseRecords = [];
      state.visibleRecords = [];
      state.operatorHeader = "";
      state.statusHeader = "";
      state.selectedOperator = "";
      state.selectedStatus = "";
      resultTable.innerHTML = "";
      resultMeta.textContent = "";
      resultTitle.innerHTML = "<strong>Resultado:</strong> cargá una planilla y elegí una opción.";
      filters.classList.add("hidden");
      downloadBtn.disabled = true;
      setActiveButton("");
      showEmpty("La tabla aparecerá acá cuando cargues el archivo y presiones un botón.", "No hay datos para mostrar");
    }

    function showEmpty(message, title = "Sin resultados") {
      tableShell.classList.add("hidden");
      emptyState.classList.remove("hidden");
      emptyState.innerHTML = `<strong>${escapeHtml(title)}</strong>${escapeHtml(message)}`;
    }

    function showError(message) {
      resultTitle.innerHTML = `<strong class="error">Error:</strong> ${escapeHtml(message)}`;
      resultMeta.textContent = "";
      resultTable.innerHTML = "";
      filters.classList.add("hidden");
      downloadBtn.disabled = true;
      showEmpty(message, "Sin resultados");
      fileStatus.textContent = state.fileName ? `Planilla guardada: ${state.fileName}` : "Sin planilla cargada";
    }

    function formatDateTime(value) {
      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return "";
      }

      return date.toLocaleString("es-AR", {
        dateStyle: "short",
        timeStyle: "short"
      });
    }

    function readableError(error) {
      const message = error && error.message ? error.message : "";

      if (message) {
        return message;
      }

      return "No se pudo leer la planilla. Probá con un archivo Excel válido.";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
